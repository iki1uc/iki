<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>iAM – NC Visualizer</title>

<script src="nc-core.js"></script>
<script src="nc-multi.js"></script>

<style>
  body { background:#000; color:#0f0; font-family:system-ui; padding:20px; }
  #out { background:#111; padding:12px; border-radius:8px; }
  #ghostHUD {
    position:fixed; right:10px; bottom:10px;
    background:#0008; padding:8px 12px; border-radius:6px;
    color:#0f0; font-size:12px;
  }
</style>
</head>

<body>

<h1>iAM – NC Visualizer</h1>
<pre id="out">NC bereit…</pre>

<div id="ghostHUD">GHOST: online • 2ME: aktiv • Wurmloch: stabil</div>

<script>
function show(obj){
  out.textContent = typeof obj === "string"
    ? obj
    : JSON.stringify(obj, null, 2);
}

function NC_BOOT(){
  show({
    ghost:"GHOST.PING: aktiv",
    state:"2ME Innenraum",
    echo:"RAW-04 sichtbar",
    loop:"geschlossen",
    wurmloch:"IN→OUT→IN",
    status:"NC bereit"
  });
}

window.addEventListener("load", NC_BOOT);
</script>

</body>
</html>
